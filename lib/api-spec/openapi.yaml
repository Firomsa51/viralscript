openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: ViralScript API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scripts
    description: Script generation and management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scripts/generate:
    post:
      operationId: generateScript
      tags: [scripts]
      summary: Generate a viral social media script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScriptBody"
      responses:
        "200":
          description: Generated script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedScript"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scripts:
    get:
      operationId: listScripts
      tags: [scripts]
      summary: List user's scripts
      parameters:
        - name: platform
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"

  /scripts/{id}:
    get:
      operationId: getScript
      tags: [scripts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Script details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteScript
      tags: [scripts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scripts/{id}/save:
    post:
      operationId: saveScript
      tags: [scripts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Script saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scripts/stats:
    get:
      operationId: getScriptStats
      tags: [scripts]
      summary: Get script generation statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptStats"

  /scripts/recent:
    get:
      operationId: getRecentScripts
      tags: [scripts]
      summary: Get recently generated scripts
      responses:
        "200":
          description: Recent scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    GenerateScriptBody:
      type: object
      properties:
        topic:
          type: string
          description: The topic or subject for the script
        platform:
          type: string
          enum: [tiktok, instagram, youtube, youtube-long, twitter, linkedin]
        tone:
          type: string
          enum: [funny, hype, serious, inspirational, educational, storytelling, controversial]
        duration:
          type: string
          enum: [short, medium, long]
        audience:
          type: string
          description: Target audience description (e.g. "beginner entrepreneurs", "fitness enthusiasts")
        hookStyle:
          type: string
          enum: [question, shocking-stat, bold-claim, story, challenge, how-to]
          description: Style of the opening hook
      required: [topic, platform, tone, duration, audience, hookStyle]

    GeneratedScript:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        topic:
          type: string
        platform:
          type: string
        tone:
          type: string
        duration:
          type: string
        audience:
          type: string
        hookStyle:
          type: string
        script:
          type: string
        hook:
          type: string
        hashtags:
          type: array
          items:
            type: string
        saved:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, userId, topic, platform, tone, duration, audience, hookStyle, script, hook, hashtags, saved, createdAt]

    Script:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        topic:
          type: string
        platform:
          type: string
        tone:
          type: string
        duration:
          type: string
        audience:
          type: string
        hookStyle:
          type: string
        script:
          type: string
        hook:
          type: string
        hashtags:
          type: array
          items:
            type: string
        saved:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, userId, topic, platform, tone, duration, audience, hookStyle, script, hook, hashtags, saved, createdAt]

    ScriptStats:
      type: object
      properties:
        total:
          type: integer
        saved:
          type: integer
        byPlatform:
          type: object
          additionalProperties:
            type: integer
        byTone:
          type: object
          additionalProperties:
            type: integer
        topTopics:
          type: array
          items:
            type: string
      required: [total, saved, byPlatform, byTone, topTopics]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
      required: [error]
