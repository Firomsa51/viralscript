databases:
  - name: viralscript-db
    databaseName: viralscript
    user: viralscript
    plan: free

services:
  - type: web
    name: viralscript
    runtime: node
    plan: free
    buildCommand: |
      corepack enable
      pnpm install --no-frozen-lockfile --no-ignore-scripts
      pnpm --filter @workspace/api-spec run codegen
      node scripts/fix-codegen.mjs
      pnpm --filter @workspace/script-generator run build
      mkdir -p artifacts/api-server/artifacts/script-generator/dist
      cp -r artifacts/script-generator/dist/. artifacts/api-server/artifacts/script-generator/dist/
      pnpm --filter @workspace/api-server run build
    startCommand: "pnpm --filter @workspace/api-server run start"
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: GROQ_API_KEY
        value: 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
      - key: DATABASE_URL
        fromDatabase:
          name: viralscript-db
          property: connectionString
