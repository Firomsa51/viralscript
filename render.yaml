databases:
  - name: viralscript-db
    databaseName: viralscript
    user: viralscript
    plan: free

services:
  - type: web
    name: viralscript
    runtime: node
    plan: free
    buildCommand: "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && node scripts/fix-codegen.mjs && BASE_PATH=/ pnpm --filter @workspace/script-generator run build && pnpm --filter @workspace/api-server run build"
  # Start command sirreeffameera
    startCommand: "pnpm --filter @workspace/api-server run start"
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: viralscript-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
