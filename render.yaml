databases:
  - name: viralscript-db
    databaseName: viralscript
    user: viralscript
    plan: free

services:
  - type: web
    name: viralscript
    runtime: node
    plan: free
    rootDir: .
    buildCommand: "npm install -g pnpm && pnpm install --prefer-frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && node scripts/fix-codegen.mjs && BASE_PATH=/ pnpm --filter @workspace/script-generator run build && pnpm --filter @workspace/api-server run build"
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: viralscript-db
          property: connectionString
