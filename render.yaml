databases:
  - name: viralscript-db
    databaseName: viralscript
    user: viralscript
    plan: free
services:
  - type: web
    name: viralscript
    runtime: node
    plan: free
    buildCommand: |
      corepack enable
      pnpm install --no-frozen-lockfile --no-ignore-scripts
      pnpm --filter @workspace/api-spec run codegen
      node scripts/fix-codegen.mjs
      pnpm --filter @workspace/script-generator run build 2>&1 || echo "FRONTEND BUILD FAILED BUT CONTINUING"
      ls -la artifacts/script-generator/dist/ 2>&1 || echo "NO DIST FOLDER"
      mkdir -p artifacts/api-server/artifacts/script-generator/dist/public
      cp -r artifacts/script-generator/dist/. artifacts/api-server/artifacts/script-generator/dist/ 2>/dev/null || true
      BASE_PATH=/ pnpm --filter @workspace/api-server run build
    startCommand: "pnpm --filter @workspace/api-server run start"
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: viralscript-db
          property: connectionString
      - key: GROQ_API_KEY
        value: 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
      - key: SESSION_SECRET
        generateValue: true
