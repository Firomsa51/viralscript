kind = "web"
previewPath = "/"
title = "Viral Script Generator"
version = "1.0.0"
id = "artifacts/script-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23861

[services.development]
run = "pnpm --filter @workspace/script-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/script-generator", "run", "build" ]
publicDir = "artifacts/script-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23861"
BASE_PATH = "/"
